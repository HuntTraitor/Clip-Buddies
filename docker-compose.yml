services:
  backend:
    env_file:
      - .env
    tty: true
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /backend
    ports:
      - '3000:3000'
    entrypoint: [ "CompileDaemon", "--build=make build", "--command=./bin/api" ]
    restart: on-failure
    volumes:
      - ./backend:/backend
    depends_on:
      - db

  db:
    image: postgres:latest
    container_name: database
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - ./backend/db/sql/databases.sql:/docker-entrypoint-initdb.d/1.databases.sql
      - ./backend/db/sql/seeds.sql:/tmp/seeds.sql