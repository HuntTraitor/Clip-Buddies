services:
  authentik-postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTHENTIK_PG_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_PG_PASS}
      POSTGRES_DB: ${AUTHENTIK_PG_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - authentik_db:/var/lib/postgresql/data

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.1}
    command: server
    restart: unless-stopped
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB}
    volumes:
      - ./authentik/data:/data
      - ./authentik/custom-templates:/templates

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2026.2.1}
    command: worker
    restart: unless-stopped
    depends_on:
      authentik-postgresql:
        condition: service_healthy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_PG_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_PG_DB}
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./authentik/data:/data
      - ./authentik/certs:/certs
      - ./authentik/custom-templates:/templates

  peertube-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PEERTUBE_DB_USERNAME}
      POSTGRES_PASSWORD: ${PEERTUBE_DB_PASSWORD}
      POSTGRES_DB: ${PEERTUBE_DB}
    volumes:
      - peertube_db:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - peertube_redis:/data

  postfix:
    image: mwader/postfix-relay
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./peertube/opendkim/keys:/etc/opendkim/keys

  peertube:
    image: chocobozzz/peertube:production-bookworm
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_EXTRA_CA_CERTS: /certs/rootCA.pem
    depends_on:
      - peertube-postgres
      - redis
      - postfix
    ports:
      - "1935:1935"
    volumes:
      - peertube_assets:/app/client/dist
      - ./peertube/data:/data
      - ./peertube/config:/config
      - /home/hunter/.local/share/mkcert/rootCA.pem:/certs/rootCA.pem:ro
    extra_hosts:
      - "auth.localhost:host-gateway"
      - "peertube.localhost:host-gateway"
      - "jellyfin.localhost:host-gateway"

  jellyfin:
    image: jellyfin/jellyfin:latest
    restart: unless-stopped
    volumes:
      - ./jellyfin/config:/config
      - ./jellyfin/cache:/cache
      - ./jellyfin/media:/media:ro

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - authentik-server
      - peertube
      - jellyfin

volumes:
  authentik_db:
  peertube_db:
  peertube_redis:
  peertube_assets:
  caddy_data:
  caddy_config: